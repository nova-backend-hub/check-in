<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Tracker</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1d1d1f;
            --accent: #0071e3;
            --secondary: #86868b;
            --danger: #ff3b30;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            width: 90%;
            max-width: 320px;
            text-align: center;
            padding: 40px;
        }

        h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.5px; }
        #status-msg { color: var(--secondary); font-size: 0.9rem; margin-bottom: 30px; }

        #timer {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 40px;
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: var(--text);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:active { transform: scale(0.98); opacity: 0.9; }
        button.active { background: var(--danger); }

        .toast {
            position: fixed;
            bottom: 30px;
            font-size: 0.8rem;
            background: #f5f5f7;
            padding: 8px 16px;
            border-radius: 20px;
            display: none;
            border: 1px solid #d2d2d7;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Session</h1>
    <div id="status-msg">Ready to start</div>
    <div id="timer">00:00:00</div>
    
    <button id="actionBtn" onclick="toggleTracker()">Check In</button>

    <form id="fs-form" action="https://formspree.io/f/YOUR_ID_HERE" method="POST" style="display:none;">
        <input type="text" name="Event" value="Check Out Summary">
        <input type="text" name="Date" id="out-date">
        <input type="text" name="Started" id="out-start">
        <input type="text" name="Ended" id="out-end">
        <input type="text" name="Total_Duration" id="out-duration">
    </form>
</div>

<div id="toast" class="toast">Sending email...</div>

<script>
    let startTime;
    let timerInterval;

    const btn = document.getElementById('actionBtn');
    const timerText = document.getElementById('timer');
    const statusMsg = document.getElementById('status-msg');
    const toast = document.getElementById('toast');

    function toggleTracker() {
        if (!startTime) {
            // START
            startTime = new Date();
            btn.innerText = "Check Out";
            btn.classList.add('active');
            statusMsg.innerText = "Check-in successful";
            timerInterval = setInterval(updateDisplay, 1000);
        } else {
            // STOP & SEND
            const endTime = new Date();
            const duration = timerText.innerText;

            // Prepare Hidden Form
            document.getElementById('out-date').value = startTime.toLocaleDateString();
            document.getElementById('out-start').value = startTime.toLocaleTimeString();
            document.getElementById('out-end').value = endTime.toLocaleTimeString();
            document.getElementById('out-duration').value = duration;

            sendEmail();

            // Reset UI
            clearInterval(timerInterval);
            startTime = null;
            btn.innerText = "Check In";
            btn.classList.remove('active');
            timerText.innerText = "00:00:00";
            statusMsg.innerText = "Report sent to your email";
        }
    }

    function updateDisplay() {
        const now = new Date();
        const diff = new Date(now - startTime);
        const h = String(diff.getUTCHours()).padStart(2, '0');
        const m = String(diff.getUTCMinutes()).padStart(2, '0');
        const s = String(diff.getUTCSeconds()).padStart(2, '0');
        timerText.innerText = `${h}:${m}:${s}`;
    }

    function sendEmail() {
        toast.style.display = "block";
        const form = document.getElementById('fs-form');
        const data = new FormData(form);

        fetch(form.action, {
            method: 'POST',
            body: data,
            headers: { 'Accept': 'application/json' }
        }).then(response => {
            if (response.ok) {
                toast.innerText = "✓ Email Delivered";
                setTimeout(() => { toast.style.display = "none"; }, 3000);
            }
        });
    }
</script>

</body>
</html>
